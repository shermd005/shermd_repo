---
- name: Backup Configurations
  hosts: cisco
  gather_facts: false

  tasks:

    - name: Get running config
      cisco.ios.ios_command:
        commands:
          - show running-config
      register: config

    - name: Save config locally
      copy:
        content: "{{ config.stdout[0] }}"
        dest: "backups/{{ inventory_hostname }}.cfg"
      delegate_to: localhost
